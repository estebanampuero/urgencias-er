<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ingreso · Urgencias</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
<div class="login-box">
  <h1>URGENCIAS</h1>
  <p class="muted">Selecciona tu usuario para ingresar</p>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, m in msgs %}<div class="flash flash-{{cat}}">{{m}}</div>{% endfor %}
  {% endwith %}

  <form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <select name="usuario_id" required size="10">
      {% set rol_actual = namespace(val=None) %}
      {% for u in usuarios %}
        {% if u.rol != rol_actual.val %}
          {% set rol_actual.val = u.rol %}
          <option disabled>── {{ u.rol|upper }} ──</option>
        {% endif %}
        <option value="{{ u.id }}">{{ u.nombre }}{% if u.rut %} · {{ u.rut }}{% endif %}</option>
      {% endfor %}
    </select>
    <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
  </form>
</div>
</body>
</html>
